  <line x1="230" y1="180" x2="270" y2="200" stroke="url(#logoGradient)" stroke-width="12" opacity="0.6" />
  <line x1="170" y1="220" x2="130" y2="200" stroke="url(#logoGradient)" stroke-width="12" opacity="0.6" />
